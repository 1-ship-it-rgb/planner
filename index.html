<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAILY PLANNER</title>
<style>
  :root {
    --blue: #1a6ef5;
    --red: #d93025;
    --bg: #fff;
    --border: #d0d0d0;
    --border-light: #ececec;
    --text: #1d1d1f;
    --sub: #999;
    --hover: #f4f8ff;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--bg);
    padding: 11px 14px 9px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 48px;
  }
  .header-left { display: flex; align-items: baseline; gap: 4px; }
  .header-year { font-size: 13px; color: var(--sub); font-weight: 400; }
  .header-month { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; }
  .header-nav { display: flex; }
  .header-nav button { background: none; border: none; font-size: 22px; color: var(--blue); cursor: pointer; padding: 2px 10px; line-height: 1; }
  .back-btn-header { background: none; border: none; color: var(--blue); font-size: 15px; cursor: pointer; padding: 0; display: none; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: 500; color: var(--sub); padding: 5px 0; border-bottom: 1px solid var(--border-light); }
  .weekdays span:first-child { color: var(--red); }
  .weekdays span:last-child  { color: var(--blue); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border-light); }
  .day, .day-empty { border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); min-height: 64px; }
  .day { padding: 5px 4px 4px; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; transition: background 0.1s; }
  .day:active { background: var(--hover); }
  .day-num { font-size: 12px; font-weight: 400; color: var(--text); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .day.sunday .day-num  { color: var(--red); }
  .day.saturday .day-num { color: var(--blue); }
  .today .day-num { background: var(--blue); color: #fff; font-weight: 700; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); margin-top: 3px; margin-left: 2px; }
  .calendar-spacer { height: 24px; }
  #planner { display: none; }
  .planner-subheader { padding: 9px 14px; border-bottom: 1px solid var(--border-light); position: sticky; top: 48px; background: white; z-index: 5; display: flex; align-items: center; gap: 8px; }
  .planner-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .autosave-badge { font-size: 11px; color: #34c759; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; }
  tr:last-child td { border-bottom: none; }
  td { border-bottom: 1px solid var(--border-light); padding: 9px 10px; vertical-align: middle; }
  .time-cell { width: 48px; color: var(--sub); font-size: 11px; font-variant-numeric: tabular-nums; border-right: 1px solid var(--border-light); white-space: nowrap; text-align: right; padding-right: 8px; }
  td input { width: 100%; border: none; outline: none; font-size: 13px; background: transparent; color: var(--text); font-family: inherit; }
  td input::placeholder { color: #ddd; }
  .col-header { background: #fafafa; font-size: 10px; color: var(--sub); font-weight: 600; letter-spacing: 0.4px; padding: 6px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 10px 14px max(env(safe-area-inset-bottom), 10px); display: flex; gap: 10px; }
  .btn { flex: 1; padding: 11px; border-radius: 7px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn:active { opacity: 0.6; }
  .btn-primary   { background: var(--blue); color: #fff; }
  .btn-secondary { background: #eef2fd; color: var(--blue); }
  #fileInput { display: none; }
  .toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(28,28,30,0.82); color: #fff; padding: 8px 16px; border-radius: 7px; font-size: 13px; opacity: 0; transition: opacity 0.22s, transform 0.22s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span class="header-year" id="headerYear"></span>
    <span class="header-month" id="headerMonth"></span>
  </div>
  <div id="calHeaderNav" class="header-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <button class="back-btn-header" id="backBtnHeader" onclick="goBack()">‹ 달력</button>
</header>
<div id="calendar"></div>
<div id="planner">
  <div class="planner-subheader">
    <span class="planner-title" id="plannerTitle"></span>
    <span class="autosave-badge" id="autosaveBadge"></span>
  </div>
  <table id="table"></table>
  <div style="height:72px;"></div>
</div>
<div class="bottom-bar" id="plannerBar" style="display:none;">
  <button class="btn btn-secondary" onclick="exportJSON()">📤 백업</button>
  <button class="btn btn-primary" onclick="goBack()">✓ 완료</button>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = "planner-v1";
function loadAllData() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; } catch { return {}; } }
function saveAllData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plannerData)); } catch { showToast("저장 실패 ❌"); } }
let plannerData = loadAllData();
let selectedDate = "";
let autosaveTimer = null;
let currentYear, currentMonth;
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
function setHeaderCal() { document.getElementById("headerYear").innerText = currentYear + "년 "; document.getElementById("headerMonth").innerText = (currentMonth + 1) + "월"; document.getElementById("calHeaderNav").style.display = "flex"; document.getElementById("backBtnHeader").style.display = "none"; }
function setHeaderPlanner(label) { document.getElementById("headerYear").innerText = ""; document.getElementById("headerMonth").innerText = label; document.getElementById("calHeaderNav").style.display = "none"; document.getElementById("backBtnHeader").style.display = "block"; }
function createCalendar() {
  setHeaderCal();
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";
  const weekdays = ["일","월","화","수","목","금","토"];
  const weekRow = document.createElement("div");
  weekRow.className = "weekdays";
  weekdays.forEach(d => { const span = document.createElement("span"); span.innerText = d; weekRow.appendChild(span); });
  calendar.appendChild(weekRow);
  const grid = document.createElement("div");
  grid.className = "grid";
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  for (let i = 0; i < firstDay; i++) { const empty = document.createElement("div"); empty.className = "day-empty"; grid.appendChild(empty); }
  for (let d = 1; d <= lastDate; d++) {
    const key = `${currentYear}-${currentMonth+1}-${d}`;
    const dow = (firstDay + d - 1) % 7;
    const div = document.createElement("div");
    div.className = "day";
    if (dow === 0) div.classList.add("sunday");
    if (dow === 6) div.classList.add("saturday");
    if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) div.classList.add("today");
    const numSpan = document.createElement("span");
    numSpan.className = "day-num";
    numSpan.innerText = d;
    div.appendChild(numSpan);
    if (plannerData[key] && plannerData[key].some(r => r.plan || r.actual)) { const dot = document.createElement("div"); dot.className = "dot"; div.appendChild(dot); }
    div.onclick = () => openDay(d);
    grid.appendChild(div);
  }
  calendar.appendChild(grid);
  const spacer = document.createElement("div");
  spacer.className = "calendar-spacer";
  calendar.appendChild(spacer);
}
function changeMonth(delta) { currentMonth += delta; if (currentMonth < 0) { currentMonth = 11; currentYear--; } if (currentMonth > 11) { currentMonth = 0; currentYear++; } createCalendar(); }
function openDay(day) {
  selectedDate = `${currentYear}-${currentMonth+1}-${day}`;
  const label = `${currentMonth+1}월 ${day}일`;
  document.getElementById("calendar").style.display = "none";
  document.getElementById("planner").style.display = "block";
  document.getElementById("plannerBar").style.display = "flex";
  document.getElementById("plannerTitle").innerText = label;
  document.getElementById("autosaveBadge").innerText = "";
  setHeaderPlanner(label);
  loadPlanner();
}
function goBack() { collectAndSave(); document.getElementById("planner").style.display = "none"; document.getElementById("plannerBar").style.display = "none"; document.getElementById("calendar").style.display = "block"; createCalendar(); }
function loadPlanner() {
  const table = document.getElementById("table");
  table.innerHTML = `<tr><td class="time-cell col-header">시간</td><td class="col-header">계획</td><td class="col-header">실제</td></tr>`;
  const saved = plannerData[selectedDate] || [];
  for (let i = 0; i < 24; i++) {
    const hour = (i + 2) % 24;
    const tr = document.createElement("tr");
    const timeTd = document.createElement("td"); timeTd.className = "time-cell"; timeTd.innerText = String(hour).padStart(2,"0") + ":00";
    const planTd = document.createElement("td"); const planInput = document.createElement("input"); planInput.placeholder = "계획"; planInput.value = saved[i]?.plan || ""; planInput.addEventListener("input", scheduleAutosave); planTd.appendChild(planInput);
    const actualTd = document.createElement("td"); const actualInput = document.createElement("input"); actualInput.placeholder = "실제"; actualInput.value = saved[i]?.actual || ""; actualInput.addEventListener("input", scheduleAutosave); actualTd.appendChild(actualInput);
    tr.appendChild(timeTd); tr.appendChild(planTd); tr.appendChild(actualTd); table.appendChild(tr);
  }
}
function scheduleAutosave() { document.getElementById("autosaveBadge").innerText = "저장 중…"; clearTimeout(autosaveTimer); autosaveTimer = setTimeout(() => { collectAndSave(); document.getElementById("autosaveBadge").innerText = "✓ 자동저장됨"; }, 1000); }
function collectAndSave() { if (!selectedDate) return; const data = []; document.querySelectorAll("#table tr").forEach(row => { const inputs = row.querySelectorAll("input"); if (inputs.length === 2) data.push({ plan: inputs[0].value, actual: inputs[1].value }); }); plannerData[selectedDate] = data; saveAllData(); }
function exportJSON() { const blob = new Blob([JSON.stringify(plannerData, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "planner-backup.json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast("백업 다운로드 📥"); }
function showToast(msg) { const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); }
createCalendar();
window.addEventListener("beforeunload", () => collectAndSave());
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") collectAndSave(); });
</script>
</body>
</html>
